name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Get version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if release exists
        id: state
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.state.outputs.exists == 'false'
        run: uv build

      - name: Smoke test wheel
        if: steps.state.outputs.exists == 'false'
        run: |
          uvx --from ./dist/fusion360_bridge-${{ steps.version.outputs.version }}-py3-none-any.whl \
            fusion360-bridge --help

      - name: Generate release notes
        if: steps.state.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          {
            echo "Install / pin in any MCP client config:"
            echo
            echo '```json'
            echo '"fusion360": {'
            echo '  "command": "uvx",'
            echo "  \"args\": [\"--from\", \"git+https://github.com/$GITHUB_REPOSITORY@$TAG\","
            echo '           "fusion360-bridge", "serve"]'
            echo '}'
            echo '```'
            echo
          } > release-notes.md
          if notes=$(gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$TAG" -f target_commitish="$GITHUB_SHA" --jq .body); then
            printf '%s\n' "$notes" >> release-notes.md
          fi

      - name: Create GitHub release
        if: steps.state.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
